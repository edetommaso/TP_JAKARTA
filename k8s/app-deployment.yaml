apiVersion: apps/v1
kind: Deployment
metadata:
  name: masterannonce-deployment
  labels:
    app: masterannonce
spec:
  replicas: 2 # Scalability constraint
  selector:
    matchLabels:
      app: masterannonce
  template:
    metadata:
      labels:
        app: masterannonce
    spec:
      containers:
      - name: masterannonce
        image: masterannonce:1.0 # Local image built in minikube
        imagePullPolicy: IfNotPresent # Critical: Don't try to pull from Docker Hub
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: app-configmap
        env:
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: masterannonce-service
spec:
  selector:
    app: masterannonce
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  # Minikube ingress will route to this ClusterIP service automatically
